<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="strongOrangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" /> <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:1" /> <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" /> </linearGradient>

    <filter id="boldShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" />
      <feOffset dx="3" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="55%" 
        font-family="Arial Black, Gadget, sans-serif" 
        font-weight="900" 
        font-size="90" 
        fill="url(#strongOrangeGrad)" 
        stroke="#E65100" 
        stroke-width="1.5"
        text-anchor="middle" 
        letter-spacing="-6"
        filter="url(#boldShadow)"
        dominant-baseline="middle">
    JN
  </text>

  <rect x="60" y="145" width="80" height="6" fill="#FF4500" rx="3">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" />
  </rect>
</svg>
